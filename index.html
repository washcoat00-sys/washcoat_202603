<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPF 차압 & 배압 분석기 v2.3</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="main.js" defer></script>
</head>
<body>
    <div class="dpf-wide-container">
        <header>
            <h1>DPF 차압 & 배압 분석기 v2.3</h1>
            <button id="theme-toggle" class="theme-btn">테마 변경</button>
        </header>
        
        <div class="main-layout">
            <!-- 왼쪽: 입력창 -->
            <aside class="layout-col col-inputs">
                <div class="system-diagram-container">
                    <img src="system_diagram.png" id="system-img" alt="구성도" onerror="this.style.display='none';">
                </div>

                <form id="dpf-form" class="vertical-form">
                    <section class="form-section">
                        <h3>무게 데이터 (kg)</h3>
                        <div class="form-row"><span>신품 무게</span><input type="number" id="weight_clean" value="11.75" step="0.01"></div>
                        <div class="form-row"><span>Soot Loaded</span><input type="number" id="weight_soot_loaded" value="11.90" step="0.01"></div>
                        <div class="form-row"><span>재생 후 무게</span><input type="number" id="weight_after_regen" value="11.80" step="0.01"></div>
                    </section>

                    <section class="form-section">
                        <h3>운전 조건</h3>
                        <div class="form-row"><span>유량(CMM)</span><input type="number" id="cmm" value="120"></div>
                        <div class="form-row"><span>온도(°C)</span><input type="number" id="temp_c" value="25"></div>
                        <div class="form-row"><span>기압(kPa)</span><input type="number" id="amb_kpa" value="101.325" step="0.001"></div>
                    </section>

                    <section class="form-section">
                        <h3>필터 및 배관 제원</h3>
                        <div class="form-row"><span>W / H / L (mm)</span>
                            <div class="triple-input">
                                <input type="number" id="width_mm" value="300" title="Width">
                                <input type="number" id="height_mm" value="300" title="Height">
                                <input type="number" id="depth_mm" value="300" title="Length">
                            </div>
                        </div>
                        <div class="form-row"><span>CPSI / Wall / Por</span>
                            <div class="triple-input">
                                <input type="number" id="cpsi" value="200" title="CPSI">
                                <input type="number" id="wall_mil" value="8" title="Wall Thickness (mil)">
                                <input type="number" id="porosity_pct" value="40" title="Porosity (%)">
                            </div>
                        </div>
                        <div class="form-row"><span>Pore(um) / k2</span>
                            <div class="triple-input">
                                <input type="number" id="pore_size_um" value="15" title="Pore Size (um)">
                                <input type="text" id="k2" value="2.0e-14" title="k2 Permeability">
                                <div style="flex:1"></div>
                            </div>
                        </div>
                        <div class="form-row"><span>Pipe(mm) / Cone(mm) / Deg(°)</span>
                            <div class="triple-input">
                                <input type="number" id="pipe_dia_mm" value="150" title="Pipe Dia (mm)">
                                <input type="number" id="cone_len_mm" value="600" title="Cone Length (mm)">
                                <input type="number" id="cone_angle_deg" value="96" title="Cone Angle (deg)">
                            </div>
                        </div>
                    </section>
                </form>

                <div class="btn-group-vertical">
                    <button id="analyze-btn" class="primary-btn">상태별 분석하기</button>
                    <button id="graph-btn" class="secondary-btn">분석 그래프 보기</button>
                </div>

                <div class="guide-box-mini">
                    ※ k2 = Tuning Knob. 예측 > 실측: k2 ↑ / 예측 < 실측: k2 ↓
                </div>
            </aside>

            <!-- 중간: 상태 분석 결과 -->
            <main class="layout-col col-results">
                <div id="results-display" class="results-container">
                    <h3>상태 분석 결과 (P1: <span id="res-p1">-</span> kPa)</h3>
                    <div id="results-content">
                        <div class="placeholder-msg">분석 버튼을 눌러주세요.</div>
                    </div>
                </div>
            </main>

            <!-- 오른쪽: 분석 그래프 -->
            <section class="layout-col col-graph">
                <div class="graph-box">
                    <h3>DPF 차압 분석 예측 그래프</h3>
                    <div class="chart-wrapper">
                        <canvas id="dpfChart"></canvas>
                    </div>
                </div>
            </section>
        </div>
    </div>
</body>
</html>
